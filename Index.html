<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Effect of Surface Area on Reaction Rate</title>
</head>

<body>

<div class="container">

    <h1>Effect of Surface Area on Reaction Rate</h1>

    <p class="subtitle">
        Choose the type of solid to observe how surface area affects the reaction rate.
    </p>

    <!-- Menu -->
    <div class="menu">

        <button id="powderBtn" class="active">
            Powder
        </button>

        <button id="solidBtn">
            Whole Solid
        </button>

    </div>

    <!-- Title -->
    <h2 id="simulationTitle">
        Powder (Large Surface Area)
    </h2>

    <!-- Beaker -->
    <div class="beaker">

        <canvas id="simulationCanvas"></canvas>

    </div>

    <!-- Status -->
    <div class="status">

        <p id="statusText">
            Reaction is Fast
        </p>

    </div>

    <!-- Controls -->
    <div class="controls">

        <button id="startBtn">
            ▶ Start
        </button>

        <button id="pauseBtn">
            ⏸ Pause
        </button>

        <button id="resetBtn">
            🔄 Reset
        </button>

    </div>

    <!-- Explanation -->
    <div class="info">

        <h3>Observation</h3>

        <p id="infoText">
            Powder has a larger surface area, allowing more particles to collide at the same time, so the reaction occurs faster.
        </p>

    </div>

</div>

</body>
</html>
